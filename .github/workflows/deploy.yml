name: CD - Deploy to ECS via Cloud Assistant

on:
  workflow_run:
    workflows: ["CI - Build and Push to ACR"]
    types:
      - completed
    branches: [main, master]

env:
  REGION_ID: ${{ secrets.ALIYUN_REGION }}  # cn-hangzhou
  INSTANCE_ID: ${{ secrets.ECS_INSTANCE_ID }}
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
  ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
  IMAGE_NAME: openclaw/demo-service  # ACR 仓库路径

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via Cloud Assistant (Python API)
        run: |
          python3 << 'PYTHON_SCRIPT'
          import requests
          import hmac
          import hashlib
          import base64
          import urllib.parse
          import uuid
          import os
          from datetime import datetime
          
          # 配置
          AK_ID = "${{ secrets.ALIYUN_AK_ID }}"
          AK_SECRET = "${{ secrets.ALIYUN_AK_SECRET }}"
          REGION = "${{ secrets.ALIYUN_REGION }}"
          INSTANCE_ID = "${{ secrets.ECS_INSTANCE_ID }}"
          ACR_REG = "${{ secrets.ACR_REGISTRY }}"
          IMAGE_NAME = "${{ env.IMAGE_NAME }}"
          IMAGE_TAG = "sha-${{ github.sha }}"
          
          # 云助手命令
          COMMAND = f"""#!/bin/bash
          set -e
          IMAGE="{ACR_REG}/{IMAGE_NAME}:{IMAGE_TAG}"
          echo "Deploying $IMAGE..."
          docker login -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}" "{ACR_REG}"
          docker pull "$IMAGE"
          docker stop demo-service 2>/dev/null || true
          docker rm demo-service 2>/dev/null || true
          docker run -d --name demo-service -p 5000:5000 --restart unless-stopped -e APP_VERSION="{IMAGE_TAG}" "$IMAGE"
          echo "Deployment completed!"
          """
          
          # API 参数（AccessKeyId 需要单独处理）
          api_params = {
              'Action': 'InvokeCommand',
              'Version': '2014-05-26',
              'SignatureMethod': 'HMAC-SHA1',
              'SignatureVersion': '1.0',
              'SignatureNonce': str(uuid.uuid4()),
              'Timestamp': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'Format': 'JSON',
              'RegionId': REGION,
              'Type': 'RunShellScript',
              'CommandContent': base64.b64encode(COMMAND.encode()).decode(),
              'InstanceId.1': INSTANCE_ID,
              'Name': 'demo-service-deploy',
              'Timed': 'false',
              'AccessKeyId': AK_ID  # AccessKeyId 也要参与签名
          }
          
          # 生成签名
          sorted_params = '&'.join([f"{k}={urllib.parse.quote(str(v), safe='')}" for k, v in sorted(api_params.items())])
          string_to_sign = f"GET&%2F&{urllib.parse.quote(sorted_params, safe='')}"
          signature = base64.b64encode(hmac.new((AK_SECRET + '&').encode(), string_to_sign.encode(), hashlib.sha1).digest()).decode()
          
          # 调用 API
          url = f"https://ecs.aliyuncs.com/?Signature={urllib.parse.quote(signature)}&{sorted_params}"
          response = requests.get(url)
          result = response.json()
          
          if 'InvokeId' in result:
              print(f"✅ 云助手命令已触发！InvokeId: {result['InvokeId']}")
              print(f"Image: {ACR_REG}/{IMAGE_NAME}:{IMAGE_TAG}")
              print(f"ECS: {INSTANCE_ID}")
          else:
              print(f"❌ API 调用失败：{result}")
              exit(1)
          PYTHON_SCRIPT

      - name: Get latest image tag
        id: image
        run: |
          TAG="sha-${{ github.sha }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Full image: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:$TAG"

      - name: Deploy via Cloud Assistant
        run: |
          # 创建云助手命令
          COMMAND_CONTENT=$(base64 -w0 << 'EOF'
          #!/bin/bash
          set -e
          
          IMAGE="${ACR_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          CONTAINER_NAME="demo-service"
          
          echo "Deploying $IMAGE..."
          
          # 登录 ACR
          docker login -u "${ACR_USERNAME}" -p "${ACR_PASSWORD}" "${ACR_REGISTRY}"
          
          # 拉取最新镜像
          docker pull "$IMAGE"
          
          # 停止旧容器
          docker stop "$CONTAINER_NAME" 2>/dev/null || true
          docker rm "$CONTAINER_NAME" 2>/dev/null || true
          
          # 启动新容器
          docker run -d \
            --name "$CONTAINER_NAME" \
            -p 5000:5000 \
            --restart unless-stopped \
            -e ENVIRONMENT=production \
            -e APP_VERSION="${IMAGE_TAG}" \
            "$IMAGE"
          
          # 清理旧镜像
          docker image prune -f
          
          echo "Deployment completed!"
          EOF
          )
          
          # 调用云助手 API
          aliyun ecs InvokeCommand \
            --RegionId "$REGION_ID" \
            --Type RunShellScript \
            --CommandContent "$COMMAND_CONTENT" \
            --InstanceId.1 "$INSTANCE_ID" \
            --Name "deploy-demo-service" \
            --Timed false

      - name: Wait for deployment
        run: |
          echo "Waiting for ECS to pull image and start..."
          sleep 30

      - name: Verify deployment
        run: |
          echo "✅ Deployment initiated successfully!"
          echo "Image: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}"
          echo "ECS Instance: ${{ env.INSTANCE_ID }}"
          echo ""
          echo "Next steps:"
          echo "1. Check ECS logs: aliyun ecs DescribeInvocations --RegionId $REGION_ID"
          echo "2. Verify service: curl http://<ECS-Internal-IP>:5000/health"
